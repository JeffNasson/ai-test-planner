name: Run QA Tests

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'
            
            - name: Install dependencies
              run: |
                pip install playwright python-dotenv
                playwright install
            
            - name: Run tests
              run: python -c "from ListParent import run_default_tests; run_default_tests()"
            
            - name: Upload test results
              uses: actions/upload-artifact@v3
              with:
                name: test-results
                path: |
                    test_results/
                    test_results_json/